<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>MCAddon Translator SaaS</title>

    <style>
        body {
            font-family: sans-serif;
            background: #0f172a;
            color: white;
            padding: 20px;
        }

        textarea {
            width: 100%;
            height: 120px;
            font-size: 14px;
            padding: 10px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        .box {
            background: #1e293b;
            padding: 15px;
            margin-top: 20px;
            border-radius: 10px;
        }

        .history {
            font-size: 13px;
            opacity: 0.8;
        }

        .loading {
            color: #38bdf8;
        }
    </style>
</head>

<body>

<h2>🧠 MCAddon Translator SaaS</h2>

<textarea id="input" placeholder="翻訳したいテキストを入力..."></textarea>

<br>

<button onclick="translate()">翻訳</button>

<button onclick="clearHistory()">履歴クリア</button>

<div class="box">
    <h3>結果</h3>
    <div id="output"></div>
</div>

<div class="box">
    <h3>履歴</h3>
    <div id="history"></div>
</div>

<script>

let historyList = [];

// =========================
// 翻訳処理
// =========================
async function translate() {

    const text = document.getElementById("input").value;

    if (!text) return;

    const output = document.getElementById("output");

    output.innerHTML = "<div class='loading'>翻訳中...</div>";

    try {

        const res = await fetch("http://127.0.0.1:8000/translate", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text })
        });

        const data = await res.json();

        output.innerHTML = data.output;

        // 履歴追加
        addHistory(text, data.output);

    } catch (e) {
        output.innerHTML = "エラー: " + e;
    }
}

// =========================
// 履歴追加
// =========================
function addHistory(input, output) {

    historyList.unshift({
        input,
        output
    });

    renderHistory();
}

// =========================
// 履歴描画
// =========================
function renderHistory() {

    const div = document.getElementById("history");

    div.innerHTML = historyList.map(h => `
        <div class="history">
            <b>入力:</b> ${h.input}<br>
            <b>出力:</b> ${h.output}
            <hr>
        </div>
    `).join("");
}

// =========================
// 履歴クリア
// =========================
function clearHistory() {

    historyList = [];
    renderHistory();
}

</script>

</body>
</html>
